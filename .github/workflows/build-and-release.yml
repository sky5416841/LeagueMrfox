name: 🦊 Release to Discord

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: 💾 還原訊息 ID 快取
        uses: actions/cache/restore@v4
        with:
          path: .msg_ids
          key: discord-msg-ids

      - name: 📋 取得 Release 資訊
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null)
          fi
          echo "Resolved TAG: $TAG"

          NOTES=$(gh release view "$TAG" --repo ${{ github.repository }} --json body --jq '.body' 2>/dev/null || echo "本次版本更新")
          DATE=$(date '+%Y/%m/%d')
          ASSET_URL=$(gh release view "$TAG" --repo ${{ github.repository }} --json assets 2>/dev/null | jq -r '.assets[] | select(.name | endswith(".exe")) | .url' | head -1)

          echo "ASSET_URL: $ASSET_URL"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "notes=${NOTES:-本次版本更新}" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT

      - name: 📥 下載 exe
        run: curl -L -o LeagueMrfox.exe "${{ steps.info.outputs.asset_url }}"

      - name: 🗑️ 刪除舊的下載訊息
        env:
          DISCORD_WEBHOOK_FILES: ${{ secrets.DISCORD_WEBHOOK_FILES }}
        run: |
          if [ -f .msg_ids/file_msg_id ]; then
            curl -s -X DELETE "${DISCORD_WEBHOOK_FILES}/messages/$(cat .msg_ids/file_msg_id)"
          fi

      - name: 📤 發送 exe 到下載連結
        id: send_file
        env:
          DISCORD_WEBHOOK_FILES: ${{ secrets.DISCORD_WEBHOOK_FILES }}
        run: |
          RESPONSE=$(curl -s -X POST "${DISCORD_WEBHOOK_FILES}?wait=true" \
            -F "payload_json={\"content\":\"🦊 **LeagueMrfox ${{ steps.info.outputs.tag }} 最新版來囉！**\n直接點擊下方檔案下載即可 👇\"}" \
            -F "file=@LeagueMrfox.exe")
          echo "msg_id=$(echo "$RESPONSE" | jq -r '.id')" >> $GITHUB_OUTPUT

      - name: 🗑️ 刪除舊的更新訊息
        env:
          DISCORD_WEBHOOK_NEWS: ${{ secrets.DISCORD_WEBHOOK_NEWS }}
        run: |
          if [ -f .msg_ids/news_msg_id ]; then
            curl -s -X DELETE "${DISCORD_WEBHOOK_NEWS}/messages/$(cat .msg_ids/news_msg_id)"
          fi

      - name: 📢 發送更新資訊
        id: send_news
        env:
          DISCORD_WEBHOOK_NEWS: ${{ secrets.DISCORD_WEBHOOK_NEWS }}
          ROLE_ID: ${{ secrets.LEAGUEMRFOX_ROLE_ID }}
        run: |
          RESPONSE=$(curl -s -X POST "${DISCORD_WEBHOOK_NEWS}?wait=true" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"<@&${ROLE_ID}>\",
              \"allowed_mentions\": {\"roles\": [\"${ROLE_ID}\"]},
              \"embeds\": [{
                \"title\": \"🦊 LeagueMrfox ${{ steps.info.outputs.tag }} 已更新！\",
                \"color\": 1752220,
                \"fields\": [
                  {\"name\": \"📅 更新日期\", \"value\": \"${{ steps.info.outputs.date }}\", \"inline\": true},
                  {\"name\": \"🔖 版本\", \"value\": \"\`${{ steps.info.outputs.tag }}\`\", \"inline\": true},
                  {\"name\": \"📝 更新內容\", \"value\": \"${{ steps.info.outputs.notes }}\", \"inline\": false}
                ],
                \"footer\": {\"text\": \"狐狸先生的小木屋 · 自動更新通知\"}
              }]
            }")
          echo "msg_id=$(echo "$RESPONSE" | jq -r '.id')" >> $GITHUB_OUTPUT

      - name: 🔢 更新版本語音頻道名稱
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          VERSION_CHANNEL_ID: ${{ secrets.VERSION_CHANNEL_ID }}
        run: |
          curl -s -X PATCH "https://discord.com/api/v10/channels/${VERSION_CHANNEL_ID}" \
            -H "Authorization: Bot ${BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"🦊 LeagueMrfox ${{ steps.info.outputs.tag }}\"}"
          echo "版本頻道已更新為 🦊 LeagueMrfox ${{ steps.info.outputs.tag }}"

      - name: 💾 儲存新的訊息 ID
        run: |
          mkdir -p .msg_ids
          echo "${{ steps.send_file.outputs.msg_id }}" > .msg_ids/file_msg_id
          echo "${{ steps.send_news.outputs.msg_id }}" > .msg_ids/news_msg_id

      - name: 💾 更新快取
        uses: actions/cache/save@v4
        with:
          path: .msg_ids
          key: discord-msg-ids
