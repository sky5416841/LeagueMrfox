<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>選角戰術中樞</title>
  <script src="/eel.js"></script>
  <link rel="stylesheet" href="overlay.css?v=2">
</head>
<body>
  <div id="ov-titlebar" class="pywebview-drag-region">
    <span class="ov-title">▶▶ 選角戰術中樞</span>
    <span class="ov-phase" id="ov-phase">CHAMP SELECT</span>
  </div>

  <div id="ov-body">
    <!-- 陣容傷害組成比較 -->
    <div class="ov-section">
      <div class="ov-sec-hdr">// 陣容傷害組成</div>
      <div id="ov-comp">
        <div class="ov-empty">等待雙方選角中...</div>
      </div>
    </div>

    <!-- 戰術提示 -->
    <div class="ov-section" id="ov-flags-sec" style="display:none">
      <div class="ov-sec-hdr">// 戰術提示</div>
      <div id="ov-flags"></div>
    </div>

    <!-- 本場禁用 -->
    <div class="ov-section" id="ov-bans-sec" style="display:none">
      <div class="ov-sec-hdr">// 本場禁用</div>
      <div id="ov-bans" class="ov-champ-row"></div>
    </div>

    <!-- Meta 推薦禁用（依線路） -->
    <div class="ov-section">
      <div class="ov-sec-hdr">// 建議禁用 <span class="ov-sub" id="ov-banhelp-mode">依線路 · 當前 meta 強勢</span></div>
      <div id="ov-banhelp-lanes">
        <div class="ov-empty">載入中...</div>
      </div>
    </div>
  </div>

  <script src="overlay.js?v=3"></script>
</body>
</html>
